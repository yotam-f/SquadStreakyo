<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SquadStreak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="m.png">
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: white;
            color: black;
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .orange-glow { box-shadow: 0 10px 30px -5px rgba(249, 115, 22, 0.4); }
        .neo-card { 
            border: 2px solid black; 
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); 
            transition: all 0.1s ease;
        }
        .neo-card:active { 
            transform: translate(2px, 2px); 
            box-shadow: 1px 1px 0px 0px rgba(0,0,0,1); 
        }
        .loading-flame { animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-white border-b-2 border-orange-100 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-2">
            <i data-lucide="flame" class="text-orange-500 fill-orange-500 w-6 h-6"></i>
            <h1 class="font-black italic tracking-tighter text-xl text-orange-600">SQUADSTREAK</h1>
        </div>
        <div id="header-streak" class="hidden flex items-center gap-1 bg-orange-500 text-white px-3 py-1 rounded-full font-bold text-sm">
            <i data-lucide="flame" class="w-4 h-4 fill-white"></i>
            <span id="streak-val">0</span>
        </div>
    </header>

    <!-- App Content -->
    <main id="app-view" class="pt-24 pb-32 px-6 max-w-md mx-auto min-h-screen">
        <div class="flex flex-col items-center justify-center h-[60vh]">
            <i data-lucide="flame" class="text-orange-500 w-16 h-16 loading-flame fill-orange-500"></i>
            <p class="mt-6 font-black text-orange-500 animate-pulse tracking-widest text-sm">CONNECTING TO DATABASE...</p>
        </div>
    </main>

    <!-- Nav Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-black px-6 pt-4 pb-8 flex justify-around items-center z-50 safe-bottom">
        <button onclick="setView('tasks')" id="nav-tasks" class="text-orange-500 transition-colors">
            <i data-lucide="check-square" class="w-7 h-7"></i>
        </button>
        <button onclick="setView('squad')" id="nav-squad" class="text-gray-300 transition-colors">
            <i data-lucide="users" class="w-7 h-7"></i>
        </button>
        <button onclick="setView('settings')" id="nav-settings" class="text-gray-300 transition-colors">
            <i data-lucide="settings" class="w-7 h-7"></i>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, addDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWX09fmqTAdACQYIm7_swND4dWzwcwwac",
            authDomain: "squadstreak-bb7b9.firebaseapp.com",
            projectId: "squadstreak-bb7b9",
            storageBucket: "squadstreak-bb7b9.firebasestorage.app",
            messagingSenderId: "394911217840",
            appId: "1:394911217840:web:b1b5606268cd2e59466375",
            measurementId: "G-0BC4LE4V01"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "squadstreak-bb7b9";

        let user = null;
        let tasks = [];
        let group = null;
        let activeView = 'tasks';

        // Initialize Authentication
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                await initUserData();
                startSync();
            } else {
                try {
                    await signInAnonymously(auth);
                } catch (e) {
                    console.error("Auth failed:", e);
                }
            }
        });

        async function initUserData() {
            // Updated Path to Rule 1: /artifacts/{appId}/users/{userId}/{collectionName}
            const userRef = doc(db, "artifacts", appId, "users", user.uid, "profile", "data");
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, { 
                    name: "Player_" + Math.floor(Math.random() * 9000),
                    groupId: null,
                    joinedAt: new Date().toISOString()
                });
            }
        }

        function startSync() {
            // Updated Path to Rule 1: profile data
            const userRef = doc(db, "artifacts", appId, "users", user.uid, "profile", "data");
            onSnapshot(userRef, (snap) => {
                const data = snap.data();
                if (data?.groupId) syncGroup(data.groupId);
                render();
            }, (err) => console.error("Profile Sync Error:", err));

            // Updated Path to Rule 1: tasks collection
            const tasksCol = collection(db, "artifacts", appId, "users", user.uid, "tasks");
            onSnapshot(tasksCol, (snap) => {
                tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("Tasks Sync Error:", err));
        }

        function syncGroup(gid) {
            // Updated Path to Rule 1: /artifacts/{appId}/public/data/{collectionName}
            const groupRef = doc(db, "artifacts", appId, "public", "data", "groups", gid);
            onSnapshot(groupRef, (snap) => {
                if (snap.exists()) {
                    group = { id: snap.id, ...snap.data() };
                    document.getElementById('header-streak').classList.remove('hidden');
                    document.getElementById('streak-val').innerText = group.streak || 0;
                }
                render();
            }, (err) => console.error("Group Sync Error:", err));
        }

        window.setView = (v) => {
            activeView = v;
            render();
        };

        window.addTask = async () => {
            const input = document.getElementById('task-in');
            const title = input.value.trim();
            if (!title || !user) return;
            
            try {
                await addDoc(collection(db, "artifacts", appId, "users", user.uid, "tasks"), {
                    title: title,
                    done: false,
                    timestamp: Date.now()
                });
                input.value = "";
            } catch (e) {
                alert("Error saving task: " + e.message);
            }
        };

        window.toggleTask = async (id, currentStatus) => {
            if (!user) return;
            await updateDoc(doc(db, "artifacts", appId, "users", user.uid, "tasks", id), {
                done: !currentStatus
            });
        };

        window.deleteTask = async (id) => {
            if (!user) return;
            await deleteDoc(doc(db, "artifacts", appId, "users", user.uid, "tasks", id));
        };

        window.createSquad = async () => {
            const name = prompt("Name your squad:");
            if (!name || !user) return;
            try {
                const groupRef = await addDoc(collection(db, "artifacts", appId, "public", "data", "groups"), {
                    name: name,
                    streak: 0,
                    createdBy: user.uid
                });
                await updateDoc(doc(db, "artifacts", appId, "users", user.uid, "profile", "data"), { groupId: groupRef.id });
            } catch (e) {
                alert("Could not create squad: " + e.message);
            }
        };

        window.joinSquad = async () => {
            const id = prompt("Paste your friend's Squad ID:");
            if (!id || !user) return;
            try {
                const snap = await getDoc(doc(db, "artifacts", appId, "public", "data", "groups", id));
                if (snap.exists()) {
                    await updateDoc(doc(db, "artifacts", appId, "users", user.uid, "profile", "data"), { groupId: id });
                } else {
                    alert("Squad ID not found.");
                }
            } catch (e) {
                alert("Error joining: " + e.message);
            }
        };

        window.logout = async () => {
            try {
                await signOut(auth);
                location.reload();
            } catch (e) {
                console.error("Logout failed:", e);
            }
        };

        function render() {
            const container = document.getElementById('app-view');
            if (!container) return;
            
            // Nav Highlighting
            const navs = ['tasks', 'squad', 'settings'];
            navs.forEach(i => {
                const el = document.getElementById('nav-' + i);
                if (el) {
                    if (activeView === i) {
                        el.classList.replace('text-gray-300', 'text-orange-500');
                    } else {
                        el.classList.replace('text-orange-500', 'text-gray-300');
                    }
                }
            });

            if (!user) return;

            if (activeView === 'tasks') {
                container.innerHTML = `
                    <div class="animate-in fade-in duration-500">
                        <h2 class="text-4xl font-black italic mb-8 tracking-tighter">HABITS</h2>
                        <div class="space-y-4 mb-10">
                            ${tasks.length === 0 ? `
                                <div class="py-12 text-center">
                                    <p class="text-gray-300 font-bold uppercase tracking-widest text-xs">No tasks yet. Add one below!</p>
                                </div>
                            ` : ''}
                            ${tasks.map(t => `
                                <div class="neo-card p-5 rounded-3xl flex items-center justify-between ${t.done ? 'bg-orange-50 border-orange-500' : 'bg-white'}">
                                    <div onclick="toggleTask('${t.id}', ${t.done})" class="flex items-center gap-4 flex-1 cursor-pointer">
                                        <i data-lucide="${t.done ? 'check-circle' : 'circle'}" class="${t.done ? 'text-orange-500' : 'text-black'}"></i>
                                        <span class="font-black text-lg ${t.done ? 'line-through opacity-30 text-orange-900' : 'text-black'}">${t.title.toUpperCase()}</span>
                                    </div>
                                    <button onclick="deleteTask('${t.id}')" class="text-gray-200 hover:text-red-500 transition-colors p-1">
                                        <i data-lucide="x" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="bg-orange-500 p-6 rounded-[2.5rem] orange-glow text-white">
                            <h3 class="text-[10px] font-black uppercase tracking-widest mb-3 opacity-70">Quick Add</h3>
                            <div class="flex gap-2">
                                <input id="task-in" type="text" placeholder="WAKE UP 6AM..." class="flex-1 bg-white/20 rounded-2xl px-5 py-4 outline-none text-white font-black placeholder:text-white/40 border-2 border-transparent focus:border-white/50 transition-all">
                                <button onclick="addTask()" class="bg-white text-orange-500 p-4 rounded-2xl active:scale-90 transition-transform">
                                    <i data-lucide="plus" class="w-6 h-6 stroke-[3px]"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (activeView === 'squad') {
                if (!group) {
                    container.innerHTML = `
                        <div class="text-center pt-10 animate-in slide-in-from-bottom-4">
                            <i data-lucide="users" class="w-20 h-20 mx-auto text-orange-100 mb-6 stroke-[1px]"></i>
                            <h2 class="text-3xl font-black italic mb-2 tracking-tighter">SQUAD UP</h2>
                            <p class="text-gray-400 font-bold text-sm mb-10 px-10 leading-relaxed">Streaks are 3x more likely to stick when done with a squad.</p>
                            <div class="space-y-4">
                                <button onclick="createSquad()" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-black text-lg orange-glow">CREATE SQUAD</button>
                                <button onclick="joinSquad()" class="w-full border-4 border-black py-5 rounded-3xl font-black text-lg">JOIN WITH ID</button>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="animate-in fade-in">
                            <div class="bg-black p-10 rounded-[3rem] text-white orange-glow mb-8 relative overflow-hidden">
                                <div class="relative z-10">
                                    <h2 class="text-5xl font-black italic mb-2 tracking-tighter">${group.name.toUpperCase()}</h2>
                                    <div class="flex items-center gap-2 text-orange-500">
                                        <i data-lucide="flame" fill="currentColor" class="w-6 h-6"></i>
                                        <span class="text-3xl font-black">${group.streak} DAY STREAK</span>
                                    </div>
                                </div>
                                <i data-lucide="flame" class="absolute -right-10 -bottom-10 w-48 h-48 text-white/5 rotate-12 stroke-[1px]"></i>
                            </div>
                            
                            <div class="bg-gray-50 p-8 rounded-[2.5rem] text-center border-2 border-dashed border-gray-200">
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Share your Squad ID</p>
                                <div class="bg-white p-4 rounded-2xl border-2 border-black font-mono font-black text-orange-600 text-lg select-all cursor-pointer">
                                    ${group.id}
                                </div>
                                <p class="mt-4 text-[10px] font-bold text-gray-300">Invite 2 friends to keep the flame alive!</p>
                            </div>
                        </div>
                    `;
                }
            } else if (activeView === 'settings') {
                container.innerHTML = `
                    <div class="animate-in fade-in">
                        <h2 class="text-4xl font-black italic mb-8 tracking-tighter">PROFILE</h2>
                        <div class="space-y-4">
                            <div class="bg-gray-50 p-6 rounded-3xl border-2 border-black/5">
                                <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Authenticated As</p>
                                <p class="font-black text-lg truncate">${user.uid}</p>
                            </div>
                            <button onclick="logout()" class="w-full border-4 border-black text-black py-5 rounded-3xl font-black text-lg flex items-center justify-center gap-3">
                                <i data-lucide="log-out"></i> LOG OUT
                            </button>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
