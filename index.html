<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SquadStreak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #f97316; }
        body { -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .neo-card { border: 2px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); transition: all 0.1s ease; }
        .neo-card:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px 0px rgba(0,0,0,1); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        #creator-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; }
        .creator-hidden { transform: translateY(240px); opacity: 0.5; }
        .day-btn { border: 1px solid rgba(255,255,255,0.3); }
        .day-btn.active { background: white; color: #f97316; border-color: white; }
    </style>
</head>
<body class="bg-white">

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8 text-center">
        <i data-lucide="flame" class="w-20 h-20 text-orange-500 fill-orange-500 mb-6 animate-pulse"></i>
        <h1 class="text-4xl font-black italic tracking-tighter mb-2 uppercase text-black">SQUADSTREAK</h1>
        <div id="login-controls" class="w-full max-w-xs space-y-4 hidden">
            <button onclick="loginWithGoogle()" class="neo-card w-full bg-white py-4 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95">
                <i data-lucide="log-in" class="w-5 h-5 text-orange-500"></i>
                GET STARTED
            </button>
        </div>
        <div id="auth-loading" class="text-xs font-black text-orange-300 uppercase tracking-widest mt-4">Syncing...</div>
    </div>

    <!-- Header -->
    <header id="app-header" class="fixed top-0 left-0 right-0 h-16 bg-white border-b-2 border-orange-100 flex items-center justify-between px-6 z-50 hidden">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full border-2 border-black overflow-hidden bg-gray-100">
                <img id="avatar-img" src="" class="w-full h-full object-cover hidden">
            </div>
            <h1 class="font-black italic tracking-tighter text-xl text-orange-500">SQUADSTREAK</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="flex items-center gap-1 bg-orange-500 text-white px-3 py-1.5 rounded-full font-bold text-xs shadow-sm" id="header-streak-box">
                <i data-lucide="flame" class="w-3 h-3 fill-white"></i>
                <span id="streak-val">0</span>
            </div>
        </div>
    </header>

    <!-- Main View -->
    <main id="app-view" class="pt-24 pb-72 px-6 max-w-md mx-auto min-h-screen hidden"></main>

    <!-- Navigation -->
    <nav id="app-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-black px-6 pt-4 pb-8 flex justify-around items-center z-50 safe-bottom hidden">
        <button onclick="setView('tasks')" id="nav-tasks" class="text-orange-500 transition-colors"><i data-lucide="check-square"></i></button>
        <button onclick="setView('squad')" id="nav-squad" class="text-gray-300 transition-colors"><i data-lucide="users"></i></button>
        <button onclick="setView('settings')" id="nav-settings" class="text-gray-300 transition-colors"><i data-lucide="settings"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, addDoc, deleteDoc, query, where, increment, writeBatch, getDocs, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWX09fmqTAdACQYIm7_swND4dWzwcwwac",
            authDomain: "squadstreak-bb7b9.firebaseapp.com",
            projectId: "squadstreak-bb7b9",
            storageBucket: "squadstreak-bb7b9.firebasestorage.app",
            messagingSenderId: "394911217840",
            appId: "1:394911217840:web:b1b5606268cd2e59466375"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const dbId = "squadstreak-bb7b9";

        let user = null, userData = {}, tasks = [], group = null, members = [], memberTasks = {};
        let activeView = 'tasks', showOnlyToday = true, creatorExpanded = false;
        let selectedDays = [0,1,2,3,4,5,6];
        let listeners = [];

        // --- AUTH ---
        window.loginWithGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => window.location.reload());

        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (u) {
                document.getElementById('auth-overlay').classList.add('hidden');
                ['app-header', 'app-view', 'app-nav'].forEach(id => document.getElementById(id).classList.remove('hidden'));
                if (u.photoURL) {
                    const img = document.getElementById('avatar-img');
                    img.src = u.photoURL; img.classList.remove('hidden');
                }
                await initUser();
                startSync();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('login-controls').classList.remove('hidden');
                document.getElementById('auth-loading').classList.add('hidden');
            }
        });

        async function initUser() {
            const ref = doc(db, "artifacts", dbId, "users", user.uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, { name: user.displayName, email: user.email, groupId: null, freezes: 3 });
            }
        }

        // --- SYNCING ---
        function startSync() {
            listeners.forEach(unsub => unsub());
            listeners = [];

            // User Data & Group Link
            const userUnsub = onSnapshot(doc(db, "artifacts", dbId, "users", user.uid), (snap) => {
                userData = snap.data() || {};
                if (userData.groupId) syncGroup(userData.groupId);
                else { group = null; render(); }
            });
            listeners.push(userUnsub);

            // Personal Tasks
            const tasksUnsub = onSnapshot(collection(db, "artifacts", dbId, "users", user.uid, "tasks"), (snap) => {
                tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
                calculateStreakIdempotent();
            });
            listeners.push(tasksUnsub);
        }

        function syncGroup(gid) {
            const groupUnsub = onSnapshot(doc(db, "artifacts", dbId, "public", "data", "groups", gid), (snap) => {
                group = snap.exists() ? { id: snap.id, ...snap.data() } : null;
                document.getElementById('streak-val').innerText = group?.streak || 0;
                render();
            });
            listeners.push(groupUnsub);

            const membersUnsub = onSnapshot(query(collection(db, "artifacts", dbId, "users"), where("groupId", "==", gid)), (snap) => {
                members = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                members.forEach(m => {
                    const mtUnsub = onSnapshot(collection(db, "artifacts", dbId, "users", m.id, "tasks"), (tSnap) => {
                        memberTasks[m.id] = tSnap.docs.map(td => ({ id: td.id, ...td.data() }));
                        render();
                        calculateStreakIdempotent();
                    });
                    listeners.push(mtUnsub);
                });
            });
            listeners.push(membersUnsub);
        }

        // --- THE FIX: IDEMPOTENT STREAK LOGIC ---
        // Uses a sub-collection "completions" to ensure a day is only ever counted once.
        async function calculateStreakIdempotent() {
            if (!group || members.length === 0) return;

            const today = new Date().getDay();
            const todayKey = new Date().toISOString().split('T')[0];
            
            let allSquadDone = true;
            let squadHasTasksToday = false;

            for (const m of members) {
                const mTasks = memberTasks[m.id] || [];
                const todaysTasks = mTasks.filter(t => t.days?.includes(today));
                if (todaysTasks.length > 0) {
                    squadHasTasksToday = true;
                    if (!todaysTasks.every(t => t.done)) {
                        allSquadDone = false;
                        break;
                    }
                }
            }

            if (!squadHasTasksToday) return;

            const completionRef = doc(db, "artifacts", dbId, "public", "data", "groups", group.id, "completions", todayKey);
            const groupRef = doc(db, "artifacts", dbId, "public", "data", "groups", group.id);

            try {
                await runTransaction(db, async (transaction) => {
                    const compDoc = await transaction.get(completionRef);
                    const groupDoc = await transaction.get(groupRef);
                    
                    if (!groupDoc.exists()) return;
                    const currentStreak = groupDoc.data().streak || 0;

                    if (allSquadDone && !compDoc.exists()) {
                        // Mark as done for today and increment
                        transaction.set(completionRef, { completedAt: new Date().toISOString(), status: 'done' });
                        transaction.update(groupRef, { streak: currentStreak + 1 });
                    } 
                    else if (!allSquadDone && compDoc.exists()) {
                        // Someone unchecked a task: Remove today's credit and decrement
                        transaction.delete(completionRef);
                        transaction.update(groupRef, { streak: Math.max(0, currentStreak - 1) });
                    }
                });
            } catch (e) {
                // Silently handle contention; the next update will retry or fix it
            }
        }

        // --- UI ACTIONS ---
        window.setView = (v) => { activeView = v; render(); };
        window.toggleFocus = () => { showOnlyToday = !showOnlyToday; render(); };
        window.toggleCreator = () => { creatorExpanded = !creatorExpanded; render(); };
        window.toggleDay = (day) => {
            selectedDays = selectedDays.includes(day) ? selectedDays.filter(d => d !== day) : [...selectedDays, day];
            render();
        };

        window.toggleTask = async (tid, status) => { 
            await updateDoc(doc(db, "artifacts", dbId, "users", user.uid, "tasks", tid), { done: !status }); 
        };

        window.addTask = async (isGroup = false) => {
            const input = document.getElementById(isGroup ? 'group-task-in' : 'task-in');
            if (!input.value.trim()) return;
            const title = input.value.trim();
            const days = isGroup ? [0,1,2,3,4,5,6] : [...selectedDays];

            if (isGroup) {
                const batch = writeBatch(db);
                members.forEach(m => {
                    const tRef = doc(collection(db, "artifacts", dbId, "users", m.id, "tasks"));
                    batch.set(tRef, { title: `[SQUAD] ${title}`, done: false, isSquad: true, days });
                });
                await batch.commit();
            } else {
                await addDoc(collection(db, "artifacts", dbId, "users", user.uid, "tasks"), { title, done: false, days });
            }
            input.value = ""; creatorExpanded = false; render();
        };

        window.deleteTask = async (e, tid) => {
            e.stopPropagation();
            if(confirm("Delete this habit?")) await deleteDoc(doc(db, "artifacts", dbId, "users", user.uid, "tasks", tid));
        };

        window.createSquad = async () => {
            const name = prompt("Squad Name:");
            if (!name) return;
            const gRef = await addDoc(collection(db, "artifacts", dbId, "public", "data", "groups"), { name, streak: 0 });
            await updateDoc(doc(db, "artifacts", dbId, "users", user.uid), { groupId: gRef.id });
        };

        window.joinSquad = async () => {
            const id = prompt("Enter Squad ID:");
            if (!id) return;
            await updateDoc(doc(db, "artifacts", dbId, "users", user.uid), { groupId: id });
        };

        window.leaveSquad = async () => {
            if (!confirm("Leave squad? Shared tasks will stay but no longer sync.")) return;
            await updateDoc(doc(db, "artifacts", dbId, "users", user.uid), { groupId: null });
        };

        // --- RENDERER ---
        window.render = () => {
            const container = document.getElementById('app-view');
            const today = new Date().getDay();
            const dayLabels = ['S','M','T','W','T','F','S'];

            ['tasks', 'squad', 'settings'].forEach(v => {
                const el = document.getElementById('nav-'+v);
                if (el) el.style.color = (activeView === v ? '#f97316' : '#d1d5db');
            });

            if (activeView === 'tasks') {
                const visible = showOnlyToday ? tasks.filter(t => t.days?.includes(today)) : tasks;
                container.innerHTML = `
                    <div class="flex justify-between items-end mb-8">
                        <h2 class="text-4xl font-black italic tracking-tighter uppercase leading-none">Habits</h2>
                        <button onclick="toggleFocus()" class="text-[10px] font-black border-2 border-black px-3 py-1 rounded-full ${showOnlyToday ? 'bg-black text-white' : ''}">
                            ${showOnlyToday ? 'TODAY' : 'ALL'}
                        </button>
                    </div>
                    <div class="space-y-3 mb-40">
                        ${visible.map(t => `
                            <div onclick="toggleTask('${t.id}', ${t.done})" class="neo-card p-5 rounded-[2rem] flex items-center gap-4 bg-white cursor-pointer ${t.done ? 'opacity-40' : ''}">
                                <i data-lucide="${t.done ? 'check-circle' : 'circle'}" class="${t.done ? 'text-orange-500' : 'text-gray-300'}"></i>
                                <div class="flex-1">
                                    <p class="font-black text-sm uppercase ${t.done ? 'line-through' : ''}">${t.title}</p>
                                    <p class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">
                                        ${t.isSquad ? '<span class="text-orange-500 mr-1">SQUAD</span>' : ''}
                                        ${t.days?.length === 7 ? 'Every Day' : t.days?.map(d => dayLabels[d]).join(' ')}
                                    </p>
                                </div>
                                <button onclick="deleteTask(event, '${t.id}')" class="p-2 text-gray-200 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    <div id="creator-panel" class="fixed bottom-24 left-6 right-6 max-w-md mx-auto ${!creatorExpanded ? 'creator-hidden' : ''}">
                        <div class="bg-orange-500 p-6 rounded-[3rem] text-white shadow-2xl border-4 border-black/10">
                            <button onclick="toggleCreator()" class="absolute -top-10 left-1/2 -translate-x-1/2 bg-black w-16 h-7 rounded-full flex items-center justify-center"><i data-lucide="${creatorExpanded ? 'chevron-down' : 'plus'}"></i></button>
                            <div class="flex justify-between mb-4">
                                ${dayLabels.map((l, i) => `<button onclick="toggleDay(${i})" class="day-btn w-8 h-8 rounded-xl font-black text-[10px] ${selectedDays.includes(i) ? 'active' : ''}">${l}</button>`).join('')}
                            </div>
                            <div class="flex gap-2">
                                <input id="task-in" type="text" placeholder="I WILL..." class="flex-1 bg-white/20 rounded-2xl px-4 py-4 outline-none font-black placeholder:text-white/40 uppercase text-sm">
                                <button onclick="addTask(false)" class="bg-white text-orange-500 w-14 rounded-2xl flex items-center justify-center"><i data-lucide="arrow-right"></i></button>
                            </div>
                        </div>
                    </div>`;
            } else if (activeView === 'squad') {
                container.innerHTML = !group ? `
                    <div class="text-center pt-20">
                        <i data-lucide="users" class="w-16 h-16 mx-auto mb-6 text-gray-100"></i>
                        <h2 class="text-2xl font-black mb-6 uppercase italic">No Squad Yet</h2>
                        <button onclick="createSquad()" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-black mb-3 shadow-lg uppercase">Start a Squad</button>
                        <button onclick="joinSquad()" class="w-full border-4 border-black py-5 rounded-3xl font-black uppercase">Join Squad</button>
                    </div>` : `
                    <div class="bg-black p-8 rounded-[3rem] text-white mb-6 relative overflow-hidden">
                        <h2 class="text-3xl font-black italic uppercase leading-tight mb-1">${group.name}</h2>
                        <p class="text-orange-500 text-xl font-black">${group.streak || 0} DAY STREAK</p>
                        <i data-lucide="flame" class="absolute -bottom-6 -right-6 w-32 h-32 opacity-10 rotate-12 fill-white"></i>
                    </div>
                    <div class="bg-orange-50 border-2 border-orange-200 p-6 rounded-[2.5rem] mb-6">
                        <p class="text-[10px] font-black text-orange-800 uppercase mb-3 tracking-widest text-center">Add Squad Task</p>
                        <div class="flex gap-2">
                            <input id="group-task-in" type="text" placeholder="E.G. 10 PUSHUPS" class="flex-1 bg-white border-2 border-orange-200 rounded-2xl px-4 py-3 font-bold text-xs outline-none">
                            <button onclick="addTask(true)" class="bg-orange-500 text-white p-3 rounded-xl"><i data-lucide="plus"></i></button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${members.map(m => {
                            const mt = (memberTasks[m.id] || []).filter(t => t.days?.includes(today));
                            const done = mt.filter(t => t.done).length;
                            const total = mt.length;
                            const pct = total > 0 ? (done/total)*100 : (mt.length > 0 ? 0 : 100);
                            return `
                            <div class="bg-white border-2 border-gray-50 p-4 rounded-[2rem] flex items-center gap-4">
                                <div class="w-10 h-10 rounded-xl ${pct === 100 ? 'bg-orange-500' : 'bg-gray-100'} flex items-center justify-center font-black text-white">
                                    ${pct === 100 ? '<i data-lucide="check" class="w-5 h-5"></i>' : (m.name?.[0] || 'U').toUpperCase()}
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between text-[10px] font-black uppercase mb-1.5">
                                        <span>${m.name || 'ANON'}</span>
                                        <span class="${pct === 100 ? 'text-orange-500' : 'text-gray-300'}">${done}/${total}</span>
                                    </div>
                                    <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                        <div class="h-full bg-orange-500 transition-all duration-500" style="width: ${pct}%"></div>
                                    </div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                    <div class="mt-8 text-center opacity-30">
                        <p class="text-[8px] font-black uppercase tracking-[0.2em]">ID: ${group.id}</p>
                    </div>`;
            } else if (activeView === 'settings') {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-gray-50 p-8 rounded-[3rem] text-center">
                            <p class="font-black text-xl uppercase mb-1">${user?.displayName}</p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${user?.email}</p>
                        </div>
                        <button onclick="leaveSquad()" class="w-full bg-white border-2 border-gray-200 py-5 rounded-[2rem] font-black text-xs uppercase">Leave Squad</button>
                        <button onclick="logout()" class="w-full bg-red-50 text-red-500 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest">Logout</button>
                    </div>`;
            }
            lucide.createIcons();
        };
    </script>
</body>
</html>
